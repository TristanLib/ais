# LSTM baseline model configuration
model:
  name: "TrajLSTM"

  # Architecture
  architecture:
    d_input: 5          # lat, lon, sog, cog_sin, cog_cos
    hidden_size: 256    # LSTM hidden dimension
    n_layers: 2         # number of LSTM layers
    dropout: 0.2
    bidirectional: false

    # Output
    forecast_steps: 30   # T = 30 time steps
    output_dim: 2        # lat, lon predictions

    # MLP head
    head_hidden: 128
    head_dropout: 0.1

  # Training
  training:
    batch_size: 128
    learning_rate: 1e-3
    weight_decay: 1e-4
    max_epochs: 80
    early_stopping_patience: 8

    # Optimizer
    optimizer: "adam"
    scheduler: "step"
    step_size: 20
    gamma: 0.5

    # Loss function
    loss_type: "mse"
    step_weights: "uniform"

  # Teacher forcing (for sequence-to-sequence training)
  teacher_forcing_ratio: 0.5

  # Checkpointing
  save_top_k: 2
  monitor_metric: "val_ade"
  monitor_mode: "min"
