# Transformer model configuration
model:
  name: "TrajTransformer"

  # Architecture
  architecture:
    d_input: 5          # lat, lon, sog, cog_sin, cog_cos
    d_model: 128        # transformer hidden dimension
    n_heads: 8          # multi-head attention
    n_layers: 6         # encoder layers
    d_ff: 512          # feed-forward dimension
    dropout: 0.1

    # Positional encoding
    pos_encoding_type: "sinusoidal"  # sinusoidal or learned
    max_seq_len: 512

    # Output
    forecast_steps: 30   # T = 30 time steps
    output_dim: 2        # lat, lon predictions

    # Optional neighbor attention
    use_neighbor_attention: false
    neighbor_d_model: 64

  # Training
  training:
    batch_size: 64
    learning_rate: 1e-4
    weight_decay: 1e-5
    max_epochs: 100
    early_stopping_patience: 10

    # Optimizer
    optimizer: "adamw"
    scheduler: "cosine"
    warmup_epochs: 5

    # Loss function
    loss_type: "smooth_l1"  # smooth_l1, mse, huber
    step_weights: "linear"   # linear, exponential, uniform

    # Regularization
    coord_smoothness_weight: 0.01
    direction_consistency_weight: 0.005

  # Mixed precision training
  use_amp: true

  # Checkpointing
  save_top_k: 3
  monitor_metric: "val_ade"
  monitor_mode: "min"

# Data augmentation
augmentation:
  enabled: true
  noise_std: 0.001      # Gaussian noise on positions
  time_shift_max: 5     # random time shift (minutes)
  dropout_rate: 0.05    # random point dropout
